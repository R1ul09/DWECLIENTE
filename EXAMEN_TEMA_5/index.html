<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>document</title>
    <style>
        body { 
          font-family: sans-serif; 
          padding: 20px; 
        }

        #panel-control { 
          background: #eee; 
          padding: 15px; 
          border-radius: 8px; 
          margin-bottom: 20px; 
        }
        
        table { 
          width: 100%; 
          border-collapse: collapse; 
          margin-top: 15px; 
        }

        th, td { 
          border: 1px solid #ccc; 
          padding: 10px; 
          text-align: left; 
        }

        .error { 
          color: red; 
          font-weight: bold; 
        }

        #miFormulario { 
          margin-top: 20px; 
          border: 1px solid #ccc; 
          padding: 15px; 
        }
    </style>
</head>
<body>

    <h1>Tienda de Ropa</h1>

    <div id="panel-control">
        <button id="btnCargar">Cargar Inventario</button>
        <button id="btnNuevo">Nuevo Producto</button>
        <button id="btnLimpiar">Limpiar Pantalla</button>
        
        <label style="margin-left: 20px;">Filtrar por Talla:</label>
        <select id="filtroTalla">
            <option value="Todas">Todas</option>
            <option value="XS">XS</option>
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="XL">XL</option>
            <option value="XXL">XXL</option>
        </select>
    </div>

    <form id="miFormulario" style="display: none;">
        <h3>Registrar Nuevo Producto</h3>
        <input type="text" id="codigo" placeholder="Código (9 chars)">
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="text" id="talla" placeholder="Talla">
        <input type="number" step="0.01" id="precio" placeholder="Precio">
        <input type="email" id="email" placeholder="Email">
        <button type="submit">Guardar</button>
        <div id="mensajeError" class="error"></div>
    </form>

    <form id="miFormularioEditar" style="display: none;">
      <h3>Modificar Producto</h3>
      <input type="hidden" id="edit-id"> 
      
      <input type="text" id="edit-codigo" placeholder="Código (9 chars)">
      <input type="text" id="edit-nombre" placeholder="Nombre">
      <input type="text" id="edit-talla" placeholder="Talla">
      <input type="number" step="0.01" id="edit-precio" placeholder="Precio">
      <input type="email" id="edit-email" placeholder="Email">
      <button type="submit">Actualizar</button>
      <div id="mensajeErrorEditar" class="error"></div>
  </form>

    <table>
        <thead>
            <tr>
                <th>Código</th>
                <th>Nombre</th>
                <th>Talla</th>
                <th>Precio</th>
                <th>Creador</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>

    <script type="module" src="main.js"></script>
</body>
</html>
